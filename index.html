<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Tracker</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: -apple-system, system-ui; background-color: var(--bg); margin: 0; padding: 15px; color: #2d3436; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .section-title { font-size: 0.8rem; font-weight: bold; color: #b2bec3; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 4px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 5px; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > div { flex: 1; }
        .toggle-group { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 5px; }
        .now-btn { background: #e1e5ea; border: none; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        button#submitBtn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .history-card { background: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid var(--primary); font-size: 0.85rem; }
        .entry-date { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--primary)">Baby Tracker 🍼</h2>

    <form id="babyForm">
        <div class="section">
            <div class="section-title">Feeding</div>
            <div class="row">
                <div>
                    <label>Start</label>
                    <input type="datetime-local" id="feedStart">
                    <button type="button" class="now-btn" onclick="setNow('feedStart')">Set Now</button>
                </div>
                <div>
                    <label>End</label>
                    <input type="datetime-local" id="feedEnd">
                    <button type="button" class="now-btn" onclick="setNow('feedEnd')">Set Now</button>
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Type</label>
                    <select id="feedType"><option value="">-</option><option value="Breast Milk">Breast Milk</option><option value="Formula">Formula</option></select>
                </div>
                <div><label>Qty (ml)</label><input type="number" id="feedQty" inputmode="numeric"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Health & Pumping</div>
            <label>Temp</label><input type="number" id="temperature" step="0.1" inputmode="decimal">
            <div class="toggle-group"><label>Pumping?</label><input type="checkbox" id="pumping" onchange="toggle('pumpArea', this)"></div>
            <div id="pumpArea" style="display:none;"><label>Pump Qty (ml)</label><input type="number" id="pumpQty" inputmode="numeric"></div>
        </div>

        <div class="section">
            <div class="section-title">Diaper</div>
            <div class="toggle-group"><label>Change?</label><input type="checkbox" id="diaperChange" onchange="toggle('diaperArea', this)"></div>
            <div id="diaperArea" style="display:none; padding-left:15px; border-left:2px solid #ddd;">
                <div class="toggle-group" style="background:none;"><label>Urine</label><input type="checkbox" id="urine"></div>
                <div class="toggle-group" style="background:none;"><label>Stools</label><input type="checkbox" id="stools"></div>
            </div>
        </div>

        <div class="section"><label>Notes</label><textarea id="comments" rows="2"></textarea></div>
        <button type="button" id="submitBtn" onclick="submitData()">Save Entry</button>
    </form>

    <div style="margin-top: 30px;">
        <div class="section-title">Shared History</div>
        <div id="historyList">Loading...</div>
    </div>

    <script>
        const scriptURL = 'REPLACE_WITH_YOUR_URL';

        function toggle(id, el) { document.getElementById(id).style.display = el.checked ? 'block' : 'none'; }

        function setNow(id) {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById(id).value = now.toISOString().slice(0, 16);
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "-") return "-";
            const d = new Date(dateStr);
            return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getFullYear()).slice(-2)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }

        async function loadHistory() {
            try {
                const resp = await fetch(scriptURL);
                const data = await resp.json();
                document.getElementById('historyList').innerHTML = data.map(row => `
                    <div class="history-card">
                        <div class="entry-date">${formatDate(row[0])}</div>
                        ${row[4] ? `<div>🍼 <b>${row[4]}</b>: ${row[5]}ml</div>` : ''}
                        ${row[1] ? `<div style="font-size:0.75rem; color:#666;">🕒 ${formatDate(row[1])} - ${formatDate(row[2])}</div>` : ''}
                        ${row[3] ? `<div>🌡️ Temp: ${row[3]}°</div>` : ''}
                        ${row[6] === "Yes" ? `<div>⛽ Pumped: ${row[7]}ml</div>` : ''}
                        ${row[8] === "Yes" ? `<div>🧷 Diaper: ${row[9] === "Yes" ? 'Urine ' : ''}${row[10] === "Yes" ? 'Stools' : ''}</div>` : ''}
                        ${row[11] ? `<div style="margin-top:5px; font-style:italic;">"${row[11]}"</div>` : ''}
                    </div>`).join('');
            } catch (e) { document.getElementById('historyList').innerHTML = "Tap 'Save' to refresh history."; }
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Saving...";
            const payload = {
                feedStart: document.getElementById('feedStart').value,
                feedEnd: document.getElementById('feedEnd').value,
                temperature: document.getElementById('temperature').value,
                feedType: document.getElementById('feedType').value,
                feedQty: document.getElementById('feedQty').value,
                pumping: document.getElementById('pumping').checked ? "Yes" : "No",
                pumpQty: document.getElementById('pumpQty').value,
                diaperChange: document.getElementById('diaperChange').checked ? "Yes" : "No",
                urine: document.getElementById('urine').checked ? "Yes" : "No",
                stools: document.getElementById('stools').checked ? "Yes" : "No",
                comments: document.getElementById('comments').value
            };

            try {
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('babyForm').reset();
                toggle('pumpArea', {checked: false}); toggle('diaperArea', {checked: false});
                setTimeout(loadHistory, 2000);
            } catch (e) { alert("Error saving."); }
            finally { btn.disabled = false; btn.innerText = "Save Entry"; }
        }
        window.onload = loadHistory;
    </script>
</body>
</html>
